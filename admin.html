<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin - Hyttevold-dagan Booking</title>

  <link rel="icon" href="images/logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>

<body>
  <header class="topbar">
    <img src="images/logo.png" alt="Logo" class="logo">

    <div>
      <h1>Adminpanel</h1>
      <p>Styr booking og plasseringer.</p>
    </div>

    <a href="index.html" class="admin-link">Til booking</a>
  </header>

  <main class="admin-layout">
    <section class="map-card">
      <div id="adminMap" class="map">
        <img src="images/plasskart.png" alt="Plasskart">
        <div id="adminLayer"></div>
      </div>
    </section>

    <aside class="admin-panel">
      <h2>Booking</h2>

      <label class="check">
        <input type="checkbox" id="bookingEnabled">
        Booking åpen
      </label>

      <label>
        Tekst når åpen
        <input id="openText">
      </label>

      <label>
        Tekst når stengt
        <input id="closedText">
      </label>

      <h2>Ny plass</h2>

      <form id="addPlaceForm">
        <label>
          Plass-ID
          <input id="newId" placeholder="13 eller A5" required>
        </label>

        <label>
          Type
          <select id="newType">
            <option value="bobil">Bobil</option>
            <option value="campingvogn">Campingvogn</option>
            <option value="telt">Telt</option>
            <option value="bat">Båt</option>
          </select>
        </label>

        <button class="primary" type="submit">Legg til</button>
      </form>

      <h2>Valgt plass</h2>

      <div id="selectedInfo">Ingen valgt.</div>

      <button id="deletePlace" class="secondary" type="button">
        Slett valgt plass
      </button>

      <h2>Lagre endringer</h2>

      <p>
        Endringer lagres direkte til Google Sheet via Apps Script.
      </p>

      <div class="admin-actions">
        <button id="saveButton" class="primary" type="button">
          Lagre endringer
        </button>

        <button id="reloadButton" class="secondary" type="button">
          Hent siste
        </button>
      </div>

      <p id="saveStatus" class="save-status"></p>

      <h2>Backup-kode</h2>

      <p>
        Denne er kun backup hvis du vil lime inn manuelt.
      </p>

      <textarea id="output" readonly></textarea>
    </aside>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="config.js"></script>
  <script src="places.js"></script>
  <script src="admin.js"></script>
</body>
</html>
